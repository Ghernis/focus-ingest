name: Build and Release

on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Tidy Go modules
      run: |
        go mod tidy

    - name: Build binaries
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o focus-ingest ./cmd/focus-ingest/main.go
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o focus-ingest.exe ./cmd/focus-ingest/main.go

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          focus-ingest
          focus-ingest.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}